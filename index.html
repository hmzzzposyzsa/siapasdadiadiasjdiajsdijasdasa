<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ikkon Store — Premium Digital Marketplace</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.383.0/umd/lucide.min.js"></script>

  <style>
    :root {
      --background: #060c1a;
      --foreground: #e2e8f8;
      --card: #0b1427;
      --primary: #3b7ef8;
      --primary-hover: #1d5ed8;
      --primary-foreground: #ffffff;
      --secondary: #111d35;
      --secondary-foreground: #b8c7e8;
      --muted-foreground: #6a85b5;
      --border: rgba(59,126,248,0.15);
      --radius: 0.75rem;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Reset & Base Styles */
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0;
    }

    body {
      background-color: var(--background);
      color: var(--foreground);
      font-family: 'Plus Jakarta Sans', sans-serif;
      padding-bottom: 90px; /* Ruang agar konten tidak tertutup footer */
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Container Utama dioptimalkan untuk Mobile-First */
    .app-container {
      width: 100%;
      max-width: 480px;
      padding: 1rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* --- BRANDING & HEADER USER --- */
    .store-header {
      background: linear-gradient(135deg, var(--card) 0%, #0e1b35 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.24);
    }

    .user-avatar-wrapper {
      position: relative;
    }

    .user-avatar {
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary);
      background: var(--secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--primary);
    }

    .status-dot {
      width: 0.75rem;
      height: 0.75rem;
      background-color: #10b981;
      border: 2px solid var(--card);
      border-radius: 50%;
      position: absolute;
      bottom: 2px;
      right: 2px;
    }

    .user-details {
      flex: 1;
    }

    .user-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .user-name {
      font-family: 'Outfit', sans-serif;
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--foreground);
    }

    .user-badge {
      font-size: 0.65rem;
      text-transform: uppercase;
      font-weight: 800;
      background: rgba(59, 126, 248, 0.15);
      color: var(--primary);
      padding: 0.15rem 0.5rem;
      border-radius: 2rem;
      border: 1px solid rgba(59, 126, 248, 0.25);
    }

    .wallet-info {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 0.25rem;
      font-size: 0.875rem;
      color: var(--muted-foreground);
    }

    .wallet-amount {
      color: #10b981;
      font-weight: 700;
    }

    /* --- NAVIGATION TABS INTERAKTIF --- */
    .tab-navigation-bar {
      display: flex;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.35rem;
      gap: 0.35rem;
    }

    .tab-trigger {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--muted-foreground);
      padding: 0.75rem;
      font-size: 0.875rem;
      font-weight: 600;
      border-radius: calc(var(--radius) - 0.25rem);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: var(--transition);
    }

    .tab-trigger i {
      width: 18px;
      height: 18px;
    }

    .tab-trigger:hover {
      color: var(--foreground);
      background: rgba(255, 255, 255, 0.02);
    }

    .tab-trigger.active {
      background: var(--primary);
      color: var(--primary-foreground);
      box-shadow: 0 4px 12px rgba(59, 126, 248, 0.25);
    }

    /* --- LAYOUT KONTEN TAB --- */
    .tab-pane {
      display: none;
      animation: tabSlideUp 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .tab-pane.active {
      display: block;
    }

    @keyframes tabSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- TAB 1: GRID PRODUK BELANJA --- */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.875rem;
    }

    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: var(--transition);
    }

    .product-card:hover {
      transform: translateY(-4px);
      border-color: rgba(59, 126, 248, 0.4);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
    }

    .product-banner {
      width: 100%;
      height: 110px;
      position: relative;
      background: #11192e;
    }

    .product-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-badge {
      position: absolute;
      top: 0.5rem;
      left: 0.5rem;
      font-size: 0.625rem;
      font-weight: 800;
      padding: 0.2rem 0.5rem;
      border-radius: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-danger { background: #ef4444; color: #fff; }
    .badge-purple { background: #8b5cf6; color: #fff; }
    .badge-success { background: #10b981; color: #fff; }

    .product-details {
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .product-category {
      font-size: 0.65rem;
      color: var(--primary);
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }

    .product-title {
      font-size: 0.875rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--foreground);
      height: 2.5rem;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      margin-bottom: 0.5rem;
    }

    .product-sales-meta {
      font-size: 0.75rem;
      color: var(--muted-foreground);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .star-icon { color: #f59e0b; }

    .product-pricing-box {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .price-current {
      font-family: 'Outfit', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #10b981;
    }

    .price-original {
      font-size: 0.75rem;
      color: var(--muted-foreground);
      text-decoration: line-through;
      margin-left: 0.25rem;
    }

    .action-buy-button {
      width: 100%;
      background: var(--primary);
      color: var(--primary-foreground);
      border: none;
      padding: 0.6rem;
      font-size: 0.75rem;
      font-weight: 700;
      border-radius: 0.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      transition: var(--transition);
    }

    .action-buy-button:hover {
      background: var(--primary-hover);
    }

    /* --- TAB 2: LINK LAYANAN & INFO KONTAK --- */
    .info-buttons-stack {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .info-link-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 1rem;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: var(--foreground);
      transition: var(--transition);
      cursor: pointer;
    }

    .info-link-card:hover {
      border-color: var(--primary);
      transform: translateX(4px);
      background: linear-gradient(90deg, var(--card) 0%, #0f1c38 100%);
    }

    .info-card-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .info-card-icon-box {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 0.5rem;
      background: rgba(59, 126, 248, 0.1);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .info-card-text h4 {
      font-size: 0.935rem;
      font-weight: 600;
      margin-bottom: 0.15rem;
    }

    .info-card-text p {
      font-size: 0.75rem;
      color: var(--muted-foreground);
    }

    /* --- SHIMMER LOADER SKELETON --- */
    .skeleton-loader {
      background: linear-gradient(90deg, #0b1427 25%, #162444 50%, #0b1427 75%);
      background-size: 200% 100%;
      animation: skeletonMove 1.5s infinite;
      border-radius: var(--radius);
      height: 200px;
    }

    @keyframes skeletonMove {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* --- STICKY BOTTOM NAVIGATION BAR (ALL BUTTON FOOTER) --- */
    .bottom-navbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(11, 20, 39, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 0.5rem;
      z-index: 1000;
    }

    /* Pembungkus Bar Footer agar rapi di desktop/layar lebar */
    .bottom-navbar-inner {
      width: 100%;
      max-width: 480px;
      display: flex;
      justify-content: space-around;
      gap: 0.25rem;
    }

    .footer-action-button {
      background: transparent;
      border: none;
      color: var(--muted-foreground);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      font-size: 0.65rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0.5rem 0;
      border-radius: 0.5rem;
      transition: var(--transition);
      flex: 1;
    }

    .footer-action-button i {
      width: 20px;
      height: 20px;
    }

    .footer-action-button:hover {
      color: var(--foreground);
      background: rgba(255, 255, 255, 0.02);
    }

    /* Penanda Menu Footer Aktif */
    .footer-action-button.active {
      color: var(--primary);
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <header class="store-header">
      <div class="user-avatar-wrapper">
        <div class="user-avatar" id="api-user-avatar">?</div>
        <div class="status-dot"></div>
      </div>
      <div class="user-details">
        <div class="user-meta">
          <span class="user-name" id="api-user-name">Memuat...</span>
          <span class="user-badge" id="api-user-role">Guest</span>
        </div>
        <div class="wallet-info">
          <i data-lucide="wallet"></i>
          <span>Saldo Anda: <span class="wallet-amount" id="api-user-balance">Rp 0</span></span>
        </div>
      </div>
    </header>

    <nav class="tab-navigation-bar">
      <button class="tab-trigger active" id="tab-trig-produk" onclick="changeActiveTab(event, 'pane-produk')">
        <i data-lucide="shopping-bag"></i> Etalase Produk
      </button>
      <button class="tab-trigger" id="tab-trig-info" onclick="changeActiveTab(event, 'pane-info')">
        <i data-lucide="info"></i> Informasi & Kontak
      </button>
    </nav>

    <main id="pane-produk" class="tab-pane active">
      <div class="products-grid" id="api-products-container">
        <div class="skeleton-loader"></div>
        <div class="skeleton-loader"></div>
      </div>
    </main>

    <section id="pane-info" class="tab-pane">
      <div class="info-buttons-stack" id="api-info-container">
        </div>
    </section>

  </div>

  <footer class="bottom-navbar">
    <div class="bottom-navbar-inner">
      
      <button class="footer-action-button active" id="foot-btn-home" onclick="syncTabFromFooter('pane-produk', 'foot-btn-home')">
        <i data-lucide="home"></i>
        <span>Beranda</span>
      </button>
      
      <button class="footer-action-button" id="foot-btn-info" onclick="syncTabFromFooter('pane-info', 'foot-btn-info')">
        <i data-lucide="layers"></i>
        <span>Layanan</span>
      </button>

      <button class="footer-action-button" onclick="executeAppFeature('riwayat')">
        <i data-lucide="history"></i>
        <span>Riwayat</span>
      </button>

      <button class="footer-action-button" onclick="executeAppFeature('akun')">
        <i data-lucide="user-check"></i>
        <span>Akun</span>
      </button>
      
    </div>
  </footer>

  <script>
    // ═════════════════════════════════════════════════════════════════
    // CONFIG: MASUKKAN URL API BACKEND HOSTING MANDIRI KAMU DI SINI
    // ═════════════════════════════════════════════════════════════════
    const EXTERNAL_API_URL = "https://api-toko-kamu-di-hosting-lain.com/api/shopdata";

    // Fungsi Pengendali Mekanisme Ganti Tab Atas
    function changeActiveTab(event, activePaneId) {
      // Hilangkan status aktif pada seluruh panel konten & tombol tab
      document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
      document.querySelectorAll('.tab-trigger').forEach(trigger => trigger.classList.remove('active'));
      
      // Nyalakan panel terpilih
      document.getElementById(activePaneId).classList.add('active');
      if (event) event.currentTarget.classList.add('active');

      // Sinkronisasikan highlight pada Tombol Footer Bawah
      document.querySelectorAll('.footer-action-button').forEach(btn => btn.classList.remove('active'));
      if (activePaneId === 'pane-produk') document.getElementById('foot-btn-home').classList.add('active');
      if (activePaneId === 'pane-info') document.getElementById('foot-btn-info').classList.add('active');
    }

    // Fungsi Pengendali Klik Footer untuk Mengubah Tab Konten Utama
    function syncTabFromFooter(targetPaneId, footerButtonId) {
      changeActiveTab(null, targetPaneId);
      document.querySelectorAll('.footer-action-button').forEach(btn => btn.classList.remove('active'));
      document.getElementById(footerButtonId).classList.add('active');
      
      // Sinkronisasikan tombol tab navigasi atas agar ikut bergeser aktif
      document.querySelectorAll('.tab-trigger').forEach(trigger => trigger.classList.remove('active'));
      if (targetPaneId === 'pane-produk') document.getElementById('tab-trig-produk').classList.add('active');
      if (targetPaneId === 'pane-info') document.getElementById('tab-trig-info').classList.add('active');
    }

    // Handler Fungsi Ekstra di Footer (Riwayat / Akun)
    function executeAppFeature(actionType) {
      if (actionType === 'riwayat') {
        alert("Fitur Riwayat Transaksi terintegrasi sistem database API eksternal.");
      } else if (actionType === 'akun') {
        alert("Membuka detail profil keamanan akun pengguna.");
      }
    }

    // Handler Fungsi Ketika Tombol Beli Produk Diklik
    function requestOrderPayment(productId) {
      alert("Memproses pesanan untuk Produk ID: " + productId + ".\nMenghubungkan antrean sistem ke Payment Gateway Hosting API Anda...");
    }

    // PENGAMBILAN DATA (FETCHING) DARI HOSTING API LUAR
    document.addEventListener("DOMContentLoaded", function() {
      // Inisialisasi awal icon bawaan halaman
      lucide.createIcons();

      // Memulai koneksi AJAX ke server API
      fetch(EXTERNAL_API_URL)
        .then(response => {
          if (!response.ok) throw new Error("Koneksi gagal saat menghubungi Endpoint Server API.");
          return response.json();
        })
        .then(storeData => {
          
          // A. Rendering Komponen Akun / User Header
          if (storeData.user) {
            document.getElementById('api-user-name').textContent = storeData.user.username || "User";
            document.getElementById('api-user-role').textContent = storeData.user.role || "Member";
            document.getElementById('api-user-balance').textContent = storeData.user.balance || "Rp 0";
            document.getElementById('api-user-avatar').textContent = storeData.user.avatarLetter || "U";
          }

          // B. Rendering Komponen Grid List Produk Belanja
          const productsContainer = document.getElementById('api-products-container');
          if (storeData.products && storeData.products.length > 0) {
            productsContainer.innerHTML = storeData.products.map(product => `
              <div class="product-card">
                <div class="product-banner">
                  <img src="${product.image}" alt="${product.name}" loading="lazy" />
                  ${product.badge ? `<span class="card-badge ${product.badgeClass || 'badge-purple'}">${product.badge}</span>` : ''}
                </div>
                <div class="product-details">
                  <span class="product-category">${product.category}</span>
                  <h3 class="product-title">${product.name}</h3>
                  <div class="product-sales-meta">
                    <span class="star-icon">★</span>
                    <strong>${product.rating || '5.0'}</strong>
                    <span>(${product.sold || '0'} Terjual)</span>
                  </div>
                  <div class="product-pricing-box">
                    <div>
                      <span class="price-current">${product.price}</span>
                      ${product.originalPrice ? `<span class="price-original">${product.originalPrice}</span>` : ''}
                    </div>
                    <button class="action-buy-button" onclick="requestOrderPayment('${product.id}')">
                      <i data-lucide="shopping-cart"></i> Beli
                    </button>
                  </div>
                </div>
              </div>
            `).join('');
          } else {
            productsContainer.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--muted-foreground); padding: 1rem;">Tidak ada produk yang tersedia saat ini.</p>`;
          }

          // C. Rendering Komponen Link Kontak & Informasi
          const infoContainer = document.getElementById('api-info-container');
          if (storeData.infoLinks && storeData.infoLinks.length > 0) {
            infoContainer.innerHTML = storeData.infoLinks.map(info => `
              <a href="${info.url}" target="_blank" class="info-link-card">
                <div class="info-card-left">
                  <div class="info-card-icon-box">
                    <i data-lucide="${info.icon || 'link-2'}"></i>
                  </div>
                  <div class="info-card-text">
                    <h4>${info.title}</h4>
                    <p>${info.subtitle}</p>
                  </div>
                </div>
                <i data-lucide="chevron-right" style="width: 18px; color: var(--muted-foreground);"></i>
              </a>
            `).join('');
          } else {
            infoContainer.innerHTML = `<p style="text-align: center; color: var(--muted-foreground); padding: 1rem;">Belum ada link informasi yang dikonfigurasi.</p>`;
          }

          // Perbarui seluruh render icon Lucide dari data baru yang diinjeksikan oleh API
          lucide.createIcons();
        })
        .catch(error => {
          console.error("Gagal melakukan Sinkronisasi API:", error);
          // Berikan indikasi kegagalan server yang estetik dan informatif kepada pengguna
          document.getElementById('api-products-container').innerHTML = `
            <p style="grid-column: 1/-1; text-align: center; color: #ef4444; font-size: 0.85rem; padding: 2rem 1rem;">
              <i data-lucide="alert-triangle" style="margin: 0 auto 0.5rem; display:block;"></i>
              Gagal menyambungkan data toko.<br>Pastikan domain Vercel Anda sudah diizinkan dalam aturan CORS Hosting API.
            </p>
          `;
          lucide.createIcons();
        });
    });
  </script>
</body>
</html>
